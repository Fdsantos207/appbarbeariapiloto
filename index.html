<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barbearia Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style-client.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <link rel="apple-touch-icon" href="img/icone-192.png">
</head>
<body>

    <div id="container-instalacao" style="display: none; padding: 15px; text-align: center; background: rgba(212, 175, 55, 0.1); border-bottom: 1px solid #D4AF37; z-index: 9999; position: relative;">
        <p style="color: #fff; font-size: 0.85rem; margin-bottom: 10px;">Acesse mais rápido instalando nosso App!</p>
        <button id="btn-instalar-app" style="
            background: linear-gradient(135deg, #D4AF37 0%, #fcf6ba 50%, #d4af37 100%);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);">
            📲 INSTALAR APLICATIVO
        </button>
    </div>

    <header>
        <div class="logo-area" style="display: flex; align-items: center;">
            <img id="img-logo-barbearia" src="" alt="Logo" style="display: none; max-height: 45px; border-radius: 8px;">
            <h1 id="nome-barbearia">Barbearia</h1>
        </div>
        <button id="btn-abrir-menu">☰</button>
    </header>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>MENU</h3>
            <button id="btn-fechar-menu">✕</button>
        </div>
        <nav>
            <a href="#" id="btn-meus-agendamentos">📅 Meus Agendamentos</a>
            <a href="#" id="btn-como-chegar" style="display: none;">📍 Como Chegar</a>
            <a href="admin.html">💼 Área do Parceiro</a>
        </nav>
    </div>
    
    <div id="overlay" class="overlay"></div>

    <div class="container">
        <div class="section-title">O QUE VAMOS FAZER HOJE?</div>
        <div class="tabs-categorias">
            <button class="tab-btn ativo" id="tab-servicos">SERVIÇOS</button>
            <button class="tab-btn" id="tab-combos">COMBOS 🔥</button>
        </div>

        <div id="lista-servicos">
            </div>

        <div class="section-title">DATA</div>
        <input type="date" id="data-agendamento">

        <div class="section-title">HORÁRIOS</div>
        <div class="grade-horarios" id="lista-horarios">
            <p style="grid-column: span 4; text-align: center; color: #666; padding: 20px;">Selecione uma data</p>
        </div>
    </div>
    
    <div class="fab-container">
        <button id="btn-finalizar" class="btn-agendar">CONFIRMAR AGENDAMENTO</button>
    </div>

    <div class="modal" id="modal-cadastro">
        <div class="modal-content">
            <h2>FINALIZAR</h2>
            <p>Informe seus dados para confirmar</p>
            <input type="text" id="cliente-nome" placeholder="Seu Nome">
            <input type="tel" id="cliente-zap" placeholder="Seu WhatsApp">
            <button class="btn-confirmar" id="btn-confirma-agendamento">AGENDAR AGORA</button>
            <button id="btn-cancelar-cadastro" class="btn-cancelar">Cancelar</button>
        </div>
    </div>

    <div id="toast-box" class="toast"></div>
    
    <script type="module" src="js/client.js"></script>
</body>
</html>
